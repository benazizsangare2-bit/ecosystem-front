openapi: 3.0.3
info:
  title: Ecosystem / EnvTrack API
  version: 1.0.0
  description: |
    Environmental reporting backend (Go + Gin + PostgreSQL).

    ## Authentication
    Most endpoints require a Bearer JWT obtained from `POST /api/login`.
    Include the header: `Authorization: Bearer <access_token>`.

    ## Response envelope
    - **Success:** `{ "success": true, "data": <payload>, "message": "<string>" }`
    - **Error:** `{ "success": false, "error": "<string>", "code": <http_status> }`

    ## Interactive docs
    Open [Swagger UI](/api/docs) in this server.

servers:
  - url: http://localhost:3030
    description: Local / Docker backend

tags:
  - name: System
  - name: Auth
  - name: Profile
  - name: Reports
  - name: Public
  - name: Social
  - name: Admin

paths:
  /api/health:
    get:
      tags: [System]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            example: ok

  /api:
    get:
      tags: [System]
      summary: API welcome message
      operationId: apiWelcome
      responses:
        "200":
          description: Welcome payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: Welcome to the ecosystem backend

  /api/register:
    post:
      tags: [Auth]
      summary: Register a new citizen account
      operationId: register
      description: |
        Creates an account and sends a Mailjet verification email (if configured).
        Phone must be a valid DRC mobile number (`+243XXXXXXXXX` or `0XXXXXXXXX`, 9 digits after prefix, starting with 8 or 9).
        Name is stored as first/last (split on first space).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: user@example.com
              name: Jean Mukendi
              phone_number: "+243812345678"
              password: secret123
      responses:
        "201":
          description: User created; verification email sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user_id:
                            type: integer
                            example: 1
              example:
                success: true
                data:
                  user_id: 1
                message: Registration successful. Please check your email to verify your account.
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email or phone already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/verify-email:
    get:
      tags: [Auth]
      summary: Verify email (link from email)
      operationId: verifyEmailGet
      description: Validates JWT with `purpose=email_verify` (24h) and sets `is_email_verified=true`.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT from verification email (`http://localhost:3000/verify?token=...`)
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Auth]
      summary: Verify email (JSON body for SPA)
      operationId: verifyEmailPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/login:
    post:
      tags: [Auth]
      summary: Login and obtain access JWT
      operationId: login
      description: Requires verified email. Returns Bearer token valid for `JWT_EXPIRY_HOURS` (default 24).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke current JWT)
      operationId: logout
      security:
        - bearerAuth: []
      description: Blacklists the token `jti` until its original expiry.
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: forgotPassword
      description: Always returns success message (no email enumeration). Sends 1h JWT reset link if account exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email sent if account exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"

  /api/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with JWT from email
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/change-password:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/profile:
    get:
      tags: [Profile]
      summary: Get current user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reports:
    post:
      tags: [Reports]
      summary: Submit a new environmental report
      operationId: createReport
      security:
        - bearerAuth: []
      description: |
        Multipart upload. Photo rules: max 5MB, `.jpg`/`.jpeg`/`.png`, minimum 200×200 px.
        Title is auto-generated from description (first 80 characters).
        Status is always `pending` on create.

        **Duplicate detection** (`DUPLICATE_MODE` env):
        - `manual` — no automatic check
        - `auto_flag` (default) — warn + `duplicate_warning=true`, notify admins
        - `auto_reject` — reject if similar report within ~80m in last 7 days
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo, description, latitude, longitude, category]
              properties:
                photo:
                  type: string
                  format: binary
                  description: Image file (jpg, jpeg, png)
                description:
                  type: string
                  minLength: 1
                latitude:
                  type: number
                  format: double
                  example: -4.321
                longitude:
                  type: number
                  format: double
                  example: 15.312
                category:
                  $ref: "#/components/schemas/ReportCategory"
                address:
                  type: string
                  description: Optional human-readable address
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/reports/user:
    get:
      tags: [Reports]
      summary: List current user's reports
      operationId: getUserReports
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of reports owned by the user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/reports/{id}:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags: [Reports]
      summary: Get a single report (owner only)
      operationId: getReport
      security:
        - bearerAuth: []
      description: Authenticated users can only fetch their own reports on this endpoint.
      responses:
        "200":
          description: Report details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Reports]
      summary: Update a pending report (owner only)
      operationId: updateReport
      security:
        - bearerAuth: []
      description: Only allowed when `status` is `pending`. All fields are optional.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportRequest"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Reports]
      summary: Delete a pending report (owner only)
      operationId: deleteReport
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Report deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reports/public:
    get:
      tags: [Public]
      summary: Public feed of investigating reports
      operationId: getPublicReports
      description: Returns reports with `status=investigating` only (main/social page).
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated public reports
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicReportsPage"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/reports/{id}/like:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    post:
      tags: [Social]
      summary: Toggle like (upvote) on a report
      operationId: toggleLike
      security:
        - bearerAuth: []
      description: Only for reports with `status=investigating`. Toggles upvote; updates owner reputation (+1 per new like).
      responses:
        "200":
          description: Like state updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LikeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reports/{id}/comments:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags: [Social]
      summary: List comments on a report
      operationId: getComments
      responses:
        "200":
          description: Comments ordered by created_at ascending
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Social]
      summary: Add a comment
      operationId: addComment
      security:
        - bearerAuth: []
      description: Only on reports with `status=investigating`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/reports:
    get:
      tags: [Admin]
      summary: List all reports (admin filters)
      operationId: adminListReports
      security:
        - bearerAuth: []
      description: Requires role `admin` or `authority`.
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ReportStatus"
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/ReportCategory"
        - name: from
          in: query
          description: Filter created_at >= (ISO date/time string)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Filter created_at <= (ISO date/time string)
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated admin report list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminReportsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/reports/{id}/status:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    put:
      tags: [Admin]
      summary: Update report status and admin notes
      operationId: adminUpdateReportStatus
      security:
        - bearerAuth: []
      description: |
        Writes an audit log entry. Side effects:
        - `investigating` — +10 reputation, notifies owner (public feed)
        - `duplicate` — -5 reputation, notifies owner; set `duplicate_of` when applicable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminStatusRequest"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Dashboard statistics
      operationId: adminStats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Aggregated stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from POST /api/login

  parameters:
    ReportId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Report ID
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: invalid category
            code: 400
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Invalid or expired token
            code: 401
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Admin access required
            code: 403
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Report not found
            code: 404
    InternalError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Database error
            code: 500

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data, message]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          description: Endpoint-specific payload
        message:
          type: string

    ErrorEnvelope:
      type: object
      required: [success, error, code]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: integer
          description: HTTP status code duplicated in body

    MessageSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              nullable: true
              example: null

    UserRole:
      type: string
      enum: [citizen, admin, authority]

    UserStatus:
      type: string
      enum: [active, suspended, banned]

    ReportCategory:
      type: string
      enum:
        - illegal_dumping
        - overflowing_waste
        - air_pollution
        - water_contamination
        - noise_pollution
        - deforestation
        - bad_roads
        - other

    ReportStatus:
      type: string
      enum:
        - pending
        - under_review
        - investigating
        - resolved
        - rejected
        - duplicate

    RegisterRequest:
      type: object
      required: [email, name, phone_number, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
          description: Full name; split into first_name / last_name on first space
        phone_number:
          type: string
          description: DRC mobile — e.g. +243812345678 or 0812345678
          example: "+243812345678"
        password:
          type: string
          format: password
          minLength: 6

    VerifyRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT from verification email

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          description: Unix timestamp when the token expires
        user:
          $ref: "#/components/schemas/User"

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          description: JWT from reset email (purpose password_reset, 1h)
        new_password:
          type: string
          format: password
          minLength: 6

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 6

    User:
      type: object
      properties:
        user_id:
          type: integer
        email:
          type: string
          format: email
        phone_number:
          type: string
          example: "+243812345678"
        first_name:
          type: string
        last_name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        is_email_verified:
          type: boolean
        reputation_score:
          type: integer
          description: "+10 investigating approval, +1 upvote received, -5 duplicate"
        total_reports:
          type: integer
        status:
          $ref: "#/components/schemas/UserStatus"
        created_at:
          type: string
          format: date-time

    Report:
      type: object
      properties:
        report_id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/ReportCategory"
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        address:
          type: string
          nullable: true
        photo_urls:
          type: array
          items:
            type: string
          description: Relative paths under /uploads/ (e.g. abc.jpg)
        thumbnail_urls:
          type: array
          items:
            type: string
          description: Relative paths under /uploads/thumbs/
        status:
          $ref: "#/components/schemas/ReportStatus"
        duplicate_of:
          type: integer
          nullable: true
        duplicate_warning:
          type: boolean
        admin_notes:
          type: string
          nullable: true
        upvote_count:
          type: integer
        view_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReportSummary:
      type: object
      properties:
        report_id:
          type: integer
        title:
          type: string
        status:
          $ref: "#/components/schemas/ReportStatus"
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        created_at:
          type: string
          format: date-time

    CreateReportResponse:
      type: object
      properties:
        report:
          $ref: "#/components/schemas/Report"
        possible_duplicates:
          type: array
          items:
            $ref: "#/components/schemas/ReportSummary"
        duplicate_warning:
          type: boolean

    UpdateReportRequest:
      type: object
      description: All fields optional; only applied when status is pending
      properties:
        title:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/ReportCategory"
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        address:
          type: string

    CommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    Comment:
      type: object
      properties:
        comment_id:
          type: integer
        report_id:
          type: integer
        user_id:
          type: integer
        author_name:
          type: string
        comment:
          type: string
        is_official_response:
          type: boolean
        created_at:
          type: string
          format: date-time

    LikeResponse:
      type: object
      properties:
        liked:
          type: boolean
          description: true if upvote was added; false if removed
        upvote_count:
          type: integer

    PublicReportsPage:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/Report"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    AdminReportsPage:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/Report"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    AdminStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ReportStatus"
        admin_notes:
          type: string
        duplicate_of:
          type: integer
          nullable: true
          description: Original report ID when status is duplicate

    AdminStats:
      type: object
      properties:
        total_reports:
          type: integer
        by_status:
          type: object
          additionalProperties:
            type: integer
          example:
            pending: 5
            investigating: 2
        by_category:
          type: object
          additionalProperties:
            type: integer
        recent_reports_7d:
          type: integer
        duplicate_warnings:
          type: integer
          description: Pending reports with duplicate_warning=true
